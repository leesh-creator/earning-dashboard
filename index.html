<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어닝자산운용 펀드 수익률 현황</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.14);
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-faint: #9ca3af;
    --accent: #1a3a6b;
    --accent-light: #e8edf5;
    --pos: #b91c1c;
    --neg: #1d4ed8;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

  /* ── 로그인 ── */
  .login-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:999; }
  .login-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:2.5rem 2rem; width:320px; text-align:center; }
  .login-logo { width:48px; height:48px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; }
  .login-logo svg { width:24px; height:24px; fill:white; }
  .login-title { font-size:16px; font-weight:600; color:var(--text); margin-bottom:4px; }
  .login-sub { font-size:12px; color:var(--text-muted); margin-bottom:1.5rem; }
  .login-input { width:100%; padding:10px 14px; border:1px solid var(--border-md); border-radius:var(--radius-sm); font-size:14px; color:var(--text); background:var(--surface); margin-bottom:10px; outline:none; text-align:center; letter-spacing:2px; }
  .login-input:focus { border-color:var(--accent); }
  .login-options { display:flex; justify-content:center; gap:20px; margin:8px 0 4px; }
  .login-check-label { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-muted); cursor:pointer; user-select:none; }
  .login-check-label input[type=checkbox] { width:14px; height:14px; cursor:pointer; accent-color:var(--accent); }
  .login-btn { width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:var(--radius-sm); font-size:14px; font-weight:500; cursor:pointer; }
  .login-btn:hover { opacity:0.9; }
  .login-error { font-size:12px; color:#b91c1c; margin-top:8px; min-height:18px; }
  .login-footer { font-size:11px; color:var(--text-faint); margin-top:1.25rem; }

  /* ── 상단바 ── */
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:56px; position:sticky; top:0; z-index:100; }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-mark { width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; }
  .logo-mark svg { width:16px; height:16px; fill:white; }
  .logo-text { font-size:15px; font-weight:600; letter-spacing:-0.3px; color:var(--accent); }
  .topbar-right { font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:8px; }
  .topbar-right span { color:var(--text); font-weight:500; }
  .logout-btn { font-size:11px; padding:3px 10px; border:1px solid var(--border-md); border-radius:4px; background:transparent; color:var(--text-muted); cursor:pointer; }
  .logout-btn:hover { background:var(--bg); }

  /* ── 본문 ── */
  .container { max-width:1100px; margin:0 auto; padding:2rem 1.5rem; }
  .fund-tabs { display:flex; gap:8px; margin-bottom:1.5rem; flex-wrap:wrap; }
  .fund-tab { padding:7px 16px; border-radius:20px; border:1px solid var(--border-md); background:var(--surface); color:var(--text-muted); font-size:13px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .fund-tab:hover { border-color:var(--accent); color:var(--accent); }
  .fund-tab.active { background:var(--accent); color:white; border-color:var(--accent); }
  .fund-info-bar { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 20px; margin-bottom:1.25rem; display:flex; flex-wrap:wrap; gap:20px; align-items:center; }
  .fund-full-name { font-size:15px; font-weight:600; color:var(--text); flex:1; min-width:200px; }
  .fund-meta-items { display:flex; gap:20px; flex-wrap:wrap; }
  .fund-meta-item { font-size:12px; color:var(--text-muted); }
  .fund-meta-item b { color:var(--text); font-weight:500; }
  .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:1.25rem; }
  .metric { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 18px; }
  .metric-label { font-size:11px; color:var(--text-muted); margin-bottom:8px; letter-spacing:0.2px; }
  .metric-value { font-size:24px; font-weight:700; letter-spacing:-0.5px; }
  .metric-sub { font-size:11px; margin-top:4px; color:var(--text-muted); }
  .pos { color:var(--pos); }
  .neg { color:var(--neg); }
  .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:1.25rem; }
  .chart-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px; }
  .legend { display:flex; gap:16px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); }
  .legend-line { width:18px; height:2px; border-radius:1px; }
  .range-btns { display:flex; gap:4px; }
  .range-btn { padding:4px 10px; border:1px solid var(--border-md); border-radius:4px; background:transparent; color:var(--text-muted); font-size:12px; cursor:pointer; transition:all 0.12s; }
  .range-btn:hover { background:var(--accent-light); color:var(--accent); border-color:var(--accent); }
  .range-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
  .chart-wrap { position:relative; width:100%; height:260px; }
  .period-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:1.25rem; }
  .period-section h3 { font-size:13px; font-weight:500; color:var(--text-muted); margin-bottom:12px; }
  .table-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:1.25rem; }
  .table-card-header { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:#fafaf9; }
  .table-card-header span { font-size:13px; color:var(--text-muted); font-weight:500; }
  table { width:100%; border-collapse:collapse; table-layout:fixed; }
  th { font-size:11px; color:var(--text-muted); font-weight:500; padding:9px 20px; text-align:right; border-bottom:1px solid var(--border); background:#fafaf9; letter-spacing:0.2px; white-space:nowrap; }
  th:first-child { text-align:left; }
  td { font-size:13px; padding:9px 20px; text-align:right; border-bottom:1px solid var(--border); }
  td:first-child { text-align:left; color:var(--text-muted); white-space:nowrap; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#fafaf9; }
  .footer { text-align:center; padding:2rem; font-size:11px; color:var(--text-faint); border-top:1px solid var(--border); margin-top:1rem; }
  .footer b { color:var(--text-muted); }

  @media (max-width:700px) {
    .metrics { grid-template-columns:repeat(2,1fr); }
    .container { padding:1rem; }
    .topbar { padding:0 1rem; }
    .fund-full-name { font-size:13px; }
    .metric-value { font-size:20px; }
  }
</style>
</head>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-logo"><svg viewBox="0 0 16 16"><path d="M2 12 L8 4 L14 12 Z"/></svg></div>
    <div class="login-title">어닝자산운용</div>

    <div class="login-options">

    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-footer">문의: 어닝자산운용 (주)</div>
  </div>
</div>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 16 16"><path d="M2 12 L8 4 L14 12 Z"/></svg></div>
    <span class="logo-text">어닝자산운용</span>
  </div>
  <div class="topbar-right">

    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<div class="container">
  <div class="fund-tabs" id="fundTabs"></div>
  <div class="fund-info-bar">
    <div class="fund-full-name" id="fundFullName">-</div>

  <div class="metrics" id="metrics"></div>
  <div class="chart-card">

      </div>
    </div>
    <div class="chart-wrap"><canvas id="navChart"></canvas></div>
  </div>
  <div class="period-section">
    <h3>기간별 수익률</h3>
    <div style="overflow-x:auto;">
      <table id="periodTable" style="min-width:500px;">
        <thead><tr id="periodTableHead"></tr></thead>
        <tbody><tr id="periodTableBody"></tr></tbody>
      </table>
    </div>
  </div>
  <div class="table-card">
    <div class="table-card-header">
      <span>최근 10거래일</span>
      <span id="tableTitle"></span>
    </div>
    <div style="overflow-x:auto;">
      <table style="min-width:400px;">
        <thead>

            <th>누적수익률</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

  const r3m=f.period_rets['3M']??0;
  const ytd=f.period_rets['YTD']??0;
  document.getElementById('metrics').innerHTML=`
    <div class="metric">
      <div class="metric-label">수정기준가 (NAV)</div>
      <div class="metric-value">${Number(nav).toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
      <div class="metric-sub ${clsCss(daily)}">전일대비 ${fmt(daily)}</div>
    </div>
    <div class="metric">
      <div class="metric-label">설정이후 누적수익률</div>
      <div class="metric-value ${clsCss(cum)}">${fmt(cum)}</div>
      <div class="metric-sub">설정일 ${f.inception}</div>
    </div>
    <div class="metric">
      <div class="metric-label">최근 1개월</div>
      <div class="metric-value ${clsCss(r1m)}">${fmt(r1m)}</div>
      <div class="metric-sub ${clsCss(r3m)}">3개월 ${fmt(r3m)}</div>
    </div>
    <div class="metric">
      <div class="metric-label">YTD (연초이후)</div>
      <div class="metric-value ${clsCss(ytd)}">${fmt(ytd)}</div>
      <div class="metric-sub">BM 대비 ${fmt(ytd)}p</div>
    </div>`;
}

function getSliced(f,range){
  let n=f.dates.length;
  if(range==='3M') n=Math.min(65,f.dates.length);
  else if(range==='6M') n=Math.min(130,f.dates.length);
  else if(range==='1Y') n=Math.min(261,f.dates.length);
  const si=f.dates.length-n;
  const sl=arr=>arr.slice(si);
  const rebase=arr=>{const b=arr[0];return arr.map(v=>+(Number(v)-Number(b)).toFixed(2));};
  return {labels:sl(f.dates),fund:rebase(sl(f.cum_rets)),bm:sl(f.dates).map(()=>0)};
}

function renderNavChart(f,range){
  const color=COLORS[curFund%COLORS.length];
  const {labels,fund,bm}=getSliced(f,range);
  const skip=Math.max(1,Math.floor(labels.length/10));
  const lbs=labels.map((l,i)=>i%skip===0?l.slice(2,7):'');
  const datasets=[
    {label:f.short_name,data:fund,borderColor:color,backgroundColor:'transparent',borderWidth:2.5,pointRadius:0,tension:0.2},
    {label:'BM(0%)',data:bm,borderColor:'#9ca3af',borderDash:[6,4],backgroundColor:'transparent',borderWidth:1,pointRadius:0},
  ];
  document.getElementById('legend').innerHTML=datasets.map(ds=>{
    const style=ds.borderDash?`border-top:2px dashed ${ds.borderColor};background:none;width:18px;height:0;`:`background:${ds.borderColor};height:2.5px;`;
    return `<div class="legend-item"><div class="legend-line" style="${style}"></div>${ds.label}</div>`;
  }).join('');
  if(navChartInst) navChartInst.destroy();
  navChartInst=new Chart(document.getElementById('navChart'),{
    type:'line',data:{labels:lbs,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y>=0?'+':''}${ctx.parsed.y.toFixed(2)}%`}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#9ca3af',maxRotation:0,autoSkip:false},border:{display:false}},
              y:{grid:{color:'rgba(156,163,175,0.12)'},ticks:{font:{size:10},color:'#9ca3af',callback:v=>(v>=0?'+':'')+v.toFixed(1)+'%'},border:{display:false}}}}
  });
}

function renderPeriodTable(f,idx){
  const color=COLORS[idx%COLORS.length];
  const periods=[
    {key:'1D',label:'1일'},{key:'1W',label:'1주'},{key:'1M',label:'1개월'},
    {key:'3M',label:'3개월'},{key:'6M',label:'6개월'},{key:'9M',label:'9개월'},
    {key:'1Y',label:'1년'},{key:'2Y',label:'2년'},{key:'ALL',label:'설정이후'},{key:'YTD',label:'YTD'},
  ].filter(p=>f.period_rets[p.key]!==undefined);
  document.getElementById('periodTableHead').innerHTML=
    periods.map(p=>`<th style="text-align:right;white-space:nowrap;">${p.label}</th>`).join('');
  document.getElementById('periodTableBody').innerHTML=
    periods.map(p=>{
      const v=Number(f.period_rets[p.key]);
      return `<td class="${clsCss(v)}" style="text-align:right;white-space:nowrap;">${v>=0?'+':''}${v.toFixed(2)}%</td>`;
    }).join('');
}

function renderTable(f){
  const len=f.dates.length;
  let rows='';
  for(let i=len-1;i>=Math.max(0,len-10);i--){
    const dr=Number(f.daily_rets[i]);
    const cr=Number(f.cum_rets[i]);
    rows+=`<tr>
      <td style="white-space:nowrap;">${f.dates[i]}</td>
      <td>${Number(f.navs[i]).toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
      <td class="${clsCss(dr)}">${fmt(dr)}</td>
      <td class="${clsCss(cr)}">${fmt(cr)}</td>
    </tr>`;
  }
  document.getElementById('tableBody').innerHTML=rows;
}

function setRange(range,btn){
  curRange=range;
  document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderNavChart(FUND_DATA.funds[curFund],range);
}

/* ── 로그인 ── */
function doLogin(){
  const id=(document.getElementById('loginInput')||{value:''}).value.trim();
  const pw=(document.getElementById('loginPw')||{value:''}).value.trim();
  const errEl=document.getElementById('loginError');

  if(!FUND_DATA||!FUND_DATA.users){
    document.getElementById('loginOverlay').style.display='none';
    renderAll(); return;
  }

  const user=FUND_DATA.users.find(u=>u.user_id===id);
  if(!user){ errEl.textContent='등록되지 않은 ID입니다.'; document.getElementById('loginInput').value=''; return; }
  if(user.password&&user.password!==pw){ errEl.textContent='비밀번호가 올바르지 않습니다.'; document.getElementById('loginPw').value=''; return; }

  saveLoginPrefs(id,pw);

  if(!user.show_all){
    const allowed=(user.funds||[]).map(f=>f.trim().toLowerCase());
    if(allowed.length>0){
      const filtered=FUND_DATA.funds.filter(f=>allowed.includes((f.short_name||'').trim().toLowerCase()));
      if(filtered.length>0) FUND_DATA.funds=filtered;
    }
  }

  if(!FUND_DATA.funds||FUND_DATA.funds.length===0){ errEl.textContent='배정된 펀드가 없습니다. 운용사에 문의해 주세요.'; return; }

  document.getElementById('loginOverlay').style.display='none';
  const unEl=document.getElementById('userNameDisplay');
  if(unEl) unEl.innerHTML=`<span style="color:var(--text-muted);font-size:12px;margin-right:8px;">${user.display_name}님</span>`;
  renderAll();
}

function doLogout(){
  localStorage.removeItem('earning_auto_login');
  localStorage.removeItem('earning_saved_pw');
  location.reload();
}

function saveLoginPrefs(id,pw){
  const doSave=document.getElementById('saveId')&&document.getElementById('saveId').checked;
  const doAuto=document.getElementById('autoLogin')&&document.getElementById('autoLogin').checked;
  if(doAuto){
    localStorage.setItem('earning_auto_login','1');
    localStorage.setItem('earning_save_id','1');
    localStorage.setItem('earning_saved_id',id);
    localStorage.setItem('earning_saved_pw',pw);
  } else if(doSave){
    localStorage.setItem('earning_save_id','1');
    localStorage.setItem('earning_auto_login','0');
    localStorage.setItem('earning_saved_id',id);
    localStorage.removeItem('earning_saved_pw');
  } else {
    localStorage.setItem('earning_save_id','0');
    localStorage.setItem('earning_auto_login','0');
    localStorage.removeItem('earning_saved_id');
    localStorage.removeItem('earning_saved_pw');
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  const savedId=localStorage.getItem('earning_saved_id')||'';
  const savedPw=localStorage.getItem('earning_saved_pw')||'';
  const saveIdChk=localStorage.getItem('earning_save_id')==='1';
  const autoChk=localStorage.getItem('earning_auto_login')==='1';
  const idEl=document.getElementById('loginInput');
  const pwEl=document.getElementById('loginPw');
  const saveEl=document.getElementById('saveId');
  const autoEl=document.getElementById('autoLogin');
  if(saveIdChk&&idEl){ idEl.value=savedId; if(saveEl) saveEl.checked=true; }
  if(autoChk&&idEl&&pwEl){
    idEl.value=savedId; pwEl.value=savedPw;
    if(saveEl) saveEl.checked=true;
    if(autoEl) autoEl.checked=true;
    setTimeout(doLogin,100); return;
  }
  if(idEl){ idEl.addEventListener('keydown',e=>{if(e.key==='Enter') doLogin();}); idEl.focus(); }
  if(pwEl) pwEl.addEventListener('keydown',e=>{if(e.key==='Enter') doLogin();});
});
</script>
